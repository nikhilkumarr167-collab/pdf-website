<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikhil's SSC CGL PDF Hub 🚀</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f9; text-align: center; }
        .header { background: #007bff; color: white; padding: 40px; }
        .ad-slot { margin: 20px auto; max-width: 728px; min-height: 90px; background: white; border: 1px solid #ddd; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        iframe { width: 100%; height: 500px; display: none; margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📚 Nikhil's Education & PDF Hub</h1>
        <p>SSC CGL Study Materials & Official Viewer</p>
    </div>

    <div class="ad-slot">
        <script type="text/javascript">
            atOptions = { 'key' : '87084c294ce16c1d5405c1e5c9408bbd', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
        </script>
        <script type="text/javascript" src="//www.highperformanceformat.com/87084c294ce16c1d5405c1e5c9408bbd/invoke.js"></script>
    </div>

    <div class="container">
        <h3>Apni PDF File Select Karein</h3>
        <input type="file" id="pdfInput" accept="application/pdf">
        <iframe id="viewer"></iframe>
    </div>

    <script>
        document.getElementById('pdfInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                const f = document.getElementById('viewer');
                f.src = url; f.style.display = "block";
            }
        });
    </script>
</body>
</html>
